spring:
  application:
    name: tramites-backend
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: tramitesdb
  web:
    cors:
      allowed-origins: "http://localhost:4200"

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    org:
      springframework:
        security: TRACE